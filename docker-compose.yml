services:
  mysql:
    image: mysql:8.0
    container_name: lzu-helper-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: lzu_helper
      MYSQL_USER: lzu_user
      MYSQL_PASSWORD: lzu_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lzu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: lzu-helper-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lzu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: lzu-helper-backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://lzu_user:lzu_password@mysql:3306/lzu_helper
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-change-in-production}
      CORS_ORIGINS: '["http://localhost:80","http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lzu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: lzu-helper-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lzu-network

volumes:
  mysql_data:
  redis_data:
  upload_data:

networks:
  lzu-network:
    driver: bridge
